name: Build SPIS image

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: Build image
    # Native arm64 runner: avoids QEMU CPU emulation entirely for the chroot
    runs-on: ubuntu-24.04-arm

    steps:
      - name: ↩️ Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # need tags for the version

      - name: 🏗️ Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            util-linux \
            parted \
            e2fsprogs \
            zerofree \
            rsync \
            curl \
            xz-utils

      - name: ⚙️ Build image
        run: sudo -E ./build.sh

      - name: ⤴️ Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: spis-image
          path: |
            dist/*.img.xz
            dist/*-CREDENTIALS.txt
            dist/version-info

      - name: 🚀 Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          append_body: true
          files: |
            dist/*.img.xz
            dist/*-CREDENTIALS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
